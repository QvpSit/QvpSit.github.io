<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivel 2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    :root {
      --bus-bg: #e8f4f8;
      --seat-normal: #a8c8e8;
      --seat-disabled: #f5c842;
      --seat-filled: #6dbd7a;
      --seat-error: #e05555;
      --red-line: #e02020;
      --hud-bg: rgba(20,30,50,0.88);
      --font-head: 'Baloo 2', cursive;
      --font-body: 'Nunito', sans-serif;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2a3a; font-family: var(--font-body); }
    #hud {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: var(--hud-bg);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; z-index: 100;
      border-bottom: 2px solid rgba(255,255,255,0.08);
    }
    #hud .label { color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
    #hud .value { color: #fff; font-family: var(--font-head); font-size: 22px; line-height: 1; }
    #hud .block { text-align: center; }
    #timer-val { color: #f5c842; }
    #scene { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; overflow: hidden; }
    #bus-body {
      position: absolute; top: 0; left: 0; right: 0; height: calc(100% - 160px);
      background-image: url('../img/fondos/interior.png');
      background-size: cover; background-position: center;
    }
    #windows-strip { position: absolute; top: 0; left: 0; right: 0; height: 28px; visibility: hidden; }
    #seats-area {
      position: absolute; top: 28px; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 52px; padding: 16px 40px 8px;
    }
    .seat-col { display: flex; flex-direction: column; gap: 12px; }
    .seat {
      width: 180px; height: 180px;
      border-radius: 12px 12px 8px 8px; border: none;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default; overflow: visible; flex-shrink: 0; background: transparent;
    }
    .seat-base-img {
      position: absolute; width: 100%; height: 100%; object-fit: contain;
      top: 0; left: 0; pointer-events: none; border-radius: 10px; transition: filter 0.15s;
    }
    .seat-char-slot {
      position: absolute; bottom: -10%; left: 50%; transform: translateX(-50%);
      width: 85%; height: 130%; pointer-events: none;
      display: flex; align-items: flex-end; justify-content: center; z-index: 3;
    }
    .seat-char-slot img { width: 100%; height: 100%; object-fit: contain; }
    .seat.highlight .seat-base-img { filter: brightness(1.25) drop-shadow(0 0 6px #4caf50); }
    .seat.error-flash .seat-base-img { filter: brightness(1.1) drop-shadow(0 0 8px #e05555); }
    .seat.filled .seat-base-img { filter: brightness(1.0) saturate(0.8); }
    .seat.row-back  { transform: translateY(-42px) scale(0.80); z-index: 1; }
    .seat.row-back.highlight   { transform: translateY(-42px) scale(0.85); }
    .seat.row-back.error-flash { transform: translateY(-42px) scale(0.80); }
    .seat.row-front { transform: translateY(42px) scale(1.32); z-index: 2; }
    .seat.row-front.highlight   { transform: translateY(42px) scale(1.37); }
    .seat.row-front.error-flash { transform: translateY(42px) scale(1.32); }
    #red-line-zone { position: absolute; bottom: 0; left: 0; right: 0; height: 160px; background: transparent; }
    #red-line { position: absolute; top: 22px; left: 0; right: 0; height: 10px; opacity: 0; }
    #char-lane { position: absolute; top: 0; left: 0; right: 0; height: 160px; pointer-events: none; }
    .character {
      position: absolute; bottom: 14px;
      width: 175px; height: 215px;
      cursor: grab; pointer-events: all;
      transition: transform 0.12s; z-index: 10; touch-action: none;
    }
    .character:hover { transform: scale(1.08) translateY(-5px); }
    .character.dragging { cursor: grabbing; z-index: 999; pointer-events: none; position: fixed; transition: none; transform-origin: top center; }
    .character img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    .char-label {
      position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #fff; white-space: nowrap;
      background: rgba(0,0,0,0.55); padding: 1px 5px; border-radius: 4px;
      font-family: var(--font-body);
    }
    #win-screen {
      display: none; position: fixed; inset: 0;
      background: rgba(10,20,35,0.92); z-index: 200;
      flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    #win-screen.show { display: flex; }
    #win-screen h1 { font-family: var(--font-head); font-size: 52px; color: #f5c842; text-shadow: 0 4px 20px rgba(245,200,66,0.5); }
    #win-screen .score-big { font-family: var(--font-head); font-size: 36px; color: #fff; }
    #win-screen .win-btns { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
    .win-btn { padding: 14px 32px; border-radius: 10px; border: none; cursor: pointer; font-family: var(--font-head); font-size: 18px; transition: transform 0.12s, filter 0.12s; }
    .win-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
    .win-btn.retry  { background: #f5c842; color: #1a2a3a; }
    .win-btn.levels { background: #4caf50; color: #fff; }
    .win-btn.menu   { background: #3a7abf; color: #fff; }
    .score-pop { position: fixed; font-family: var(--font-head); font-size: 22px; color: #6dbd7a; pointer-events: none; z-index: 300; animation: popUp 0.8s forwards; }
    @keyframes popUp { 0% { opacity:1; transform:translateY(0) scale(1);} 100% { opacity:0; transform:translateY(-60px) scale(1.4);} }
    #mobile-top-logo, #mobile-bottom-logo { display: none; }

    @media screen and (max-width: 600px) and (orientation: portrait) {
      html, body { background: #0e1b2e; }
      #mobile-top-logo { display: flex; position: fixed; top: 0; left: 0; right: 0; height: 24vh; z-index: 110; background: #0e1b2e; align-items: center; justify-content: center; }
      #mobile-top-logo img { max-height: 88%; max-width: 72%; object-fit: contain; }
      #mobile-bottom-logo { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 10vh; z-index: 110; background: #0e1b2e; align-items: center; justify-content: center; }
      #mobile-bottom-logo img { max-height: 82%; object-fit: contain; opacity: 0.9; }
      #hud { top: 24vh; height: 38px; padding: 0 12px; }
      #hud .label { font-size: 9px; }
      #hud .value { font-size: 14px; }
      #scene { top: calc(24vh + 38px); bottom: 10vh; overflow: hidden; }
      #bus-body { height: calc(100% - 130px); background-size: cover; background-position: center center; }
      #seats-area { padding: 6px 8px 2px; }
      .seat.row-back         { transform: translateY(-10px) scale(0.82) !important; }
      .seat.row-back.highlight    { transform: translateY(-10px) scale(0.87) !important; }
      .seat.row-back.error-flash  { transform: translateY(-10px) scale(0.82) !important; }
      .seat.row-front        { transform: translateY(10px)  scale(1.05) !important; }
      .seat.row-front.highlight   { transform: translateY(10px)  scale(1.10) !important; }
      .seat.row-front.error-flash { transform: translateY(10px)  scale(1.05) !important; }
      #red-line-zone { height: 130px; }
      #char-lane      { height: 130px; }
      .character { width: 95px !important; height: 116px !important; bottom: 10px; }
      .char-label { font-size: 8px; bottom: -14px; }
    }
  </style>
</head>
<body>
<div id="hud">
  <div class="block"><div class="label">Puntaje</div><div class="value" id="score-val">0</div></div>
  <div class="block"><div class="label">Nivel 2</div><div class="value" style="font-size:15px;color:#aac">Sienta a todos</div></div>
  <div class="block"><div class="label">Tiempo</div><div class="value" id="timer-val">0s</div></div>
</div>
<div id="scene">
  <div id="bus-body">
    <div id="windows-strip"></div>
    <div id="seats-area"></div>
  </div>
  <div id="red-line-zone">
    <div id="red-line"></div>
    <div id="char-lane"></div>
  </div>
</div>
<div id="mobile-top-logo"><img src="../img/logo.gif" alt="Logo del juego"></div>
<div id="mobile-bottom-logo"><img src="../img/ui/logosit.png" alt="SIT"></div>
<div id="win-screen">
  <h1>¡Nivel Completado!</h1>
  <div class="score-big" id="final-score">Puntaje: 0</div>
  <div class="win-btns">
    <button class="win-btn retry"  onclick="restartGame()">Reintentar</button>
    <button class="win-btn levels" onclick="window.location.href='../niveles.html'">Niveles</button>
    <button class="win-btn menu"   onclick="window.location.href='../index.html'">Menú</button>
  </div>
</div>

<script>
// ─── CONFIG NIVEL 2 ───
const LEVEL_NUM       = 2;
const LEVEL_NAME      = 'Nivel 2';
const NORMAL_SEATS    = 4;
const DISABLED_SEATS  = 4;
const TOTAL_SEATS     = NORMAL_SEATS + DISABLED_SEATS; // 8
const TIME_LIMIT      = 0;      // 0 = sin límite
const SPAWN_INTERVAL  = 2200;
const BASE_SCORE_PER_CHAR = 200;
const ANGER_LEAVE     = false;  // personas NO se van
const WALK_SPEED_MULT = 1.0;

const NORMAL_CHARS  = ['señor','señora','godin','godina','Obrero','niño'];
const INVALID_CHARS = ['ancianita','embarazada','fracturada','fracturado','muletas'];
const CHAR_PATH     = '../img/personajes/';

function makeAudio(src, vol = 0.6) { const a = new Audio('../' + src); a.volume = vol; return a; }
const sfx = {
  correct  : makeAudio('sounds/correct.wav'),
  incorrect: makeAudio('sounds/incorrect.wav'),
  ganar    : makeAudio('sounds/ganar.wav'),
  perder   : makeAudio('sounds/perder.wav'),
  hold     : [1,2,3,4,5,6].map(n => makeAudio('sounds/e' + n + '.wav', 0.5))
};
let holdInterval = null;
function playHold() { stopHold(); const clip = sfx.hold[Math.floor(Math.random()*sfx.hold.length)]; clip.currentTime=0; clip.play().catch(()=>{}); }
function stopHold()  { sfx.hold.forEach(a => { a.pause(); a.currentTime=0; }); }
function playSfx(key) { const a=sfx[key]; if(!a)return; a.currentTime=0; a.play().catch(()=>{}); }

let score=0, elapsed=0, timerHandle=null, spawnHandle=null, gameOver=false, seated=0;
let chosenNormal=[], chosenInvalid=[], allChars=[], spawnQueue=[], spawnIndex=0;
let dragged=null, dragOffX=0, dragOffY=0;
const physics = { angle:0, vel:0, prevX:0, rafId:null };
const PHYS_INFLUENCE=0.18, PHYS_DAMPING=0.84, PHYS_SPRING=0.08, PHYS_MAX_ANGLE=32;

// Build seatDefs dynamically
const seatDefs = [];
for(let i=0;i<NORMAL_SEATS;i++)    seatDefs.push({type:'normal'});
for(let i=0;i<DISABLED_SEATS;i++)  seatDefs.push({type:'disabled'});

let seatEls = [];
let seatFilled = Array(TOTAL_SEATS).fill(false);

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function isMobilePortrait() { return window.innerWidth<=600 && window.innerHeight>window.innerWidth; }

// ─── BUILD SEATS ───
// Siempre 2 filas. columnas = TOTAL_SEATS / 2
function buildSeats() {
  const area = document.getElementById('seats-area');
  area.innerHTML = '';
  seatEls = [];
  area.style.gap = '0';

  const mobile   = isMobilePortrait();
  const cols     = TOTAL_SEATS / 2; // columnas por lado del pasillo (la mitad de los asientos)
  // En móvil calculamos el tamaño para que quepan cols*2 asientos + pasillo en el ancho disponible
  let seatPx, gapPx, rowGapPx, aislePx;
  if (mobile) {
    const availW  = window.innerWidth - 16; // padding lateral
    const totalCols = cols * 2; // columnas en total (ambos lados)
    aislePx  = 12;
    gapPx    = 4;
    seatPx   = Math.floor((availW - aislePx - gapPx*(cols-1)*2 - gapPx*2) / totalCols);
    seatPx   = Math.max(36, Math.min(seatPx, 72));
    rowGapPx = 8;
  } else {
    seatPx   = cols <= 3 ? 180 : 140;
    gapPx    = 10;
    rowGapPx = 20;
    aislePx  = 52;
  }

  // La mitad de los asientos van a cada grupo (izquierda/derecha del pasillo)
  // Normales en grupo izquierdo, discapacitados en grupo derecho
  // Cada grupo: cols columnas, 2 filas
  const halfN = NORMAL_SEATS / 2;    // asientos normales por fila
  const halfD = DISABLED_SEATS / 2;  // asientos discapacitados por fila

  function makeGroup(indices, numCols) {
    const group = document.createElement('div');
    group.style.cssText =
      `display:grid;` +
      `grid-template-columns:repeat(${numCols},${seatPx}px);` +
      `gap:${gapPx}px;` +
      `row-gap:${rowGapPx}px;`;

    indices.forEach((idx, pos) => {
      const seat = document.createElement('div');
      const rowClass = pos < numCols ? 'row-back' : 'row-front';
      seat.className = 'seat ' + seatDefs[idx].type + ' ' + rowClass;
      seat.dataset.idx = idx;
      seat.style.width  = seatPx + 'px';
      seat.style.height = seatPx + 'px';

      const seatImg = document.createElement('img');
      seatImg.className = 'seat-base-img';
      seatImg.src = seatDefs[idx].type === 'disabled' ? '../img/sillainv.png' : '../img/silla.png';
      seatImg.alt = seatDefs[idx].type === 'disabled' ? 'Silla especial' : 'Silla';
      seat.appendChild(seatImg);

      const slot = document.createElement('div');
      slot.className = 'seat-char-slot';
      seat.appendChild(slot);

      seat.addEventListener('mouseenter', () => highlightSeat(idx));
      seat.addEventListener('mouseleave', () => unhighlightSeat(idx));
      seat.addEventListener('mouseup',    () => dropOnSeat(idx));
      seat.addEventListener('touchend',   (e) => { e.preventDefault(); dropOnSeat(idx); });

      group.appendChild(seat);
      seatEls[idx] = seat;
    });
    return group;
  }

  const aisle = document.createElement('div');
  aisle.style.cssText = `width:${aislePx}px;flex-shrink:0;`;

  // Grupo izquierdo: normales (índices 0..NORMAL_SEATS-1)
  // Grupo derecho: discapacitados (índices NORMAL_SEATS..TOTAL_SEATS-1)
  const normalIdx   = Array.from({length: NORMAL_SEATS},   (_, i) => i);
  const disabledIdx = Array.from({length: DISABLED_SEATS}, (_, i) => NORMAL_SEATS + i);

  area.appendChild(makeGroup(normalIdx,   NORMAL_SEATS/2));
  area.appendChild(aisle);
  area.appendChild(makeGroup(disabledIdx, DISABLED_SEATS/2));
}

window.addEventListener('resize', () => { buildSeats(); });

function highlightSeat(idx)   { if(dragged && !seatFilled[idx]) seatEls[idx].classList.add('highlight'); }
function unhighlightSeat(idx) { seatEls[idx].classList.remove('highlight'); }

// ─── CHARACTERS ───
function pickCharacters() {
  chosenNormal  = shuffle(NORMAL_CHARS).slice(0, NORMAL_SEATS);
  chosenInvalid = shuffle(INVALID_CHARS).slice(0, DISABLED_SEATS);
  allChars = [];
  chosenNormal.forEach((name,i)  => allChars.push({id:'n'+i, name, isInvalid:false, el:null, spawned:false, seated:false, leaveTimer:null}));
  chosenInvalid.forEach((name,i) => allChars.push({id:'v'+i, name, isInvalid:true,  el:null, spawned:false, seated:false, leaveTimer:null}));
  spawnQueue = shuffle(allChars);
  spawnIndex = 0;
}

let sectorCursor = 0;
function spawnNext() { if(spawnIndex>=spawnQueue.length)return; const char=spawnQueue[spawnIndex++]; spawnChar(char); }

function spawnChar(char) {
  const lane = document.getElementById('char-lane');
  const el   = document.createElement('div');
  el.className = 'character';
  el.dataset.id = char.id;
  el.style.right = '-120px';
  el.style.left  = 'auto';

  const img = document.createElement('img');
  img.src = CHAR_PATH + char.name + '.png';
  img.alt = char.name;
  el.appendChild(img);

  const lbl = document.createElement('div');
  lbl.className = 'char-label';
  lbl.textContent = char.name;
  el.appendChild(lbl);

  lane.appendChild(el);
  char.el = el;
  char.spawned = true;

  el.addEventListener('mousedown',  (e) => startDrag(e, char));
  el.addEventListener('touchstart', (e) => startDragTouch(e, char), {passive:false});

  walkIn(el, char);
}

function walkIn(el, char) {
  const lane  = document.getElementById('char-lane');
  const laneW = lane.offsetWidth > 0 ? lane.offsetWidth : window.innerWidth;
  const charW = isMobilePortrait() ? 95 : 175;
  const margin = 14;
  const safeMin = margin;
  const safeMax = Math.max(safeMin+charW, laneW-charW-margin);
  const N = 5, sectorW = (safeMax-safeMin)/N;
  const sector = sectorCursor % N; sectorCursor++;
  const stopX  = safeMin + sector*sectorW + Math.random()*sectorW*0.55;
  let currentX = laneW + charW;
  el.style.left  = currentX + 'px';
  el.style.right = 'auto';
  const speed = 2.5 * WALK_SPEED_MULT;
  char._walkAnim = setInterval(() => {
    if(char.seated || char._dragging) return;
    currentX -= speed;
    el.style.left = currentX + 'px';
    if(currentX <= stopX) { clearInterval(char._walkAnim); char._stopped = true; }
  }, 16);
}

function setHeldImage(char, held) {
  if(!char.el) return;
  const img = char.el.querySelector('img');
  if(!img) return;
  img.src = held ? CHAR_PATH+char.name+'_sostenido.png' : CHAR_PATH+char.name+'.png';
}

function startPhysics(char, startX) {
  physics.angle=0; physics.vel=0; physics.prevX=startX;
  function tick() {
    if(!char._dragging) return;
    physics.vel += -physics.angle*PHYS_SPRING;
    physics.vel *= PHYS_DAMPING;
    physics.angle += physics.vel;
    physics.angle = Math.max(-PHYS_MAX_ANGLE, Math.min(PHYS_MAX_ANGLE, physics.angle));
    if(char.el) char.el.style.transform = `scale(1.15) rotate(${physics.angle}deg)`;
    physics.rafId = requestAnimationFrame(tick);
  }
  physics.rafId = requestAnimationFrame(tick);
}
function stopPhysics() { if(physics.rafId){cancelAnimationFrame(physics.rafId);physics.rafId=null;} physics.angle=0; physics.vel=0; }
function feedMouseVelocity(clientX) { if(!dragged)return; const dx=clientX-physics.prevX; physics.prevX=clientX; physics.vel+=dx*PHYS_INFLUENCE; }

function startDrag(e, char) {
  if(char.seated) return;
  e.preventDefault();
  clearInterval(char._walkAnim);
  char._dragging=true; dragged=char;
  const rect=char.el.getBoundingClientRect();
  dragOffX=e.clientX-rect.left; dragOffY=e.clientY-rect.top;
  char.el.classList.add('dragging');
  char.el.style.left=rect.left+'px'; char.el.style.top=rect.top+'px';
  document.body.appendChild(char.el);
  setHeldImage(char,true); playHold(); startPhysics(char, e.clientX);
}
function startDragTouch(e, char) {
  if(char.seated) return;
  e.preventDefault();
  const t=e.touches[0];
  clearInterval(char._walkAnim);
  char._dragging=true; dragged=char;
  const rect=char.el.getBoundingClientRect();
  dragOffX=t.clientX-rect.left; dragOffY=t.clientY-rect.top;
  char.el.classList.add('dragging');
  char.el.style.left=rect.left+'px'; char.el.style.top=rect.top+'px';
  document.body.appendChild(char.el);
  setHeldImage(char,true); playHold(); startPhysics(char, t.clientX);
}
document.addEventListener('mousemove', (e) => { if(!dragged)return; dragged.el.style.left=(e.clientX-dragOffX)+'px'; dragged.el.style.top=(e.clientY-dragOffY)+'px'; feedMouseVelocity(e.clientX); });
document.addEventListener('touchmove', (e) => { if(!dragged)return; e.preventDefault(); const t=e.touches[0]; dragged.el.style.left=(t.clientX-dragOffX)+'px'; dragged.el.style.top=(t.clientY-dragOffY)+'px'; feedMouseVelocity(t.clientX); }, {passive:false});
document.addEventListener('mouseup',  endDrag);
document.addEventListener('touchend', endDrag);

function endDrag(e) {
  if(!dragged) return;
  const char=dragged; dragged=null; char._dragging=false;
  stopPhysics(); stopHold();
  if(char.el) char.el.style.transform='';
  setHeldImage(char,false);
  const pt=e.changedTouches?e.changedTouches[0]:e;
  const target=document.elementFromPoint(pt.clientX,pt.clientY);
  const seatEl=target&&(target.closest?target.closest('.seat'):null);
  if(seatEl){ const idx=parseInt(seatEl.dataset.idx); dropOnSeat(idx,char); }
  else returnToLane(char);
}

function dropOnSeat(idx, charOverride) {
  const char=charOverride||dragged;
  if(!char) return;
  if(seatFilled[idx]){ flash(seatEls[idx],'error-flash'); playSfx('incorrect'); returnToLane(char); return; }
  const seatType=seatDefs[idx].type;
  const valid=(seatType==='disabled'&&char.isInvalid)||(seatType==='normal'&&!char.isInvalid);
  if(!valid){ flash(seatEls[idx],'error-flash'); playSfx('incorrect'); returnToLane(char); score=Math.max(0,score-30); updateHUD(); return; }
  playSfx('correct');
  seatFilled[idx]=true; char.seated=true;
  seatEls[idx].classList.remove('highlight'); seatEls[idx].classList.add('filled');
  const slot=seatEls[idx].querySelector('.seat-char-slot');
  slot.innerHTML='';
  const charImg=document.createElement('img');
  charImg.src=CHAR_PATH+char.name+'.png'; charImg.alt=char.name;
  slot.appendChild(charImg);
  if(char.el){if(char.el.parentNode)char.el.parentNode.removeChild(char.el);char.el=null;}
  const timeBonus=Math.max(0, 100-elapsed);
  const pts=BASE_SCORE_PER_CHAR+timeBonus;
  score+=pts; showScorePop('+'+pts, seatEls[idx]); updateHUD();
  seated++;
  if(seated>=TOTAL_SEATS) endGame();
}

function returnToLane(char) {
  if(!char.el) return;
  char.el.classList.remove('dragging'); char.el.style.transform='';
  const lane=document.getElementById('char-lane');
  lane.appendChild(char.el);
  const laneRect=lane.getBoundingClientRect(); const elRect=char.el.getBoundingClientRect();
  char.el.style.left=(elRect.left-laneRect.left)+'px'; char.el.style.top='auto';
  char._stopped=true;
}

function flash(el, cls) { el.classList.add(cls); setTimeout(()=>el.classList.remove(cls),600); }

function showScorePop(text, anchor) {
  const r=anchor.getBoundingClientRect();
  const pop=document.createElement('div');
  pop.className='score-pop'; pop.textContent=text;
  pop.style.left=(r.left+r.width/2-20)+'px'; pop.style.top=(r.top-10)+'px';
  document.body.appendChild(pop); setTimeout(()=>pop.remove(),800);
}

function updateHUD() {
  document.getElementById('score-val').textContent=score;
  document.getElementById('timer-val').textContent=elapsed+'s';
}

function startTimer() {
  timerHandle=setInterval(()=>{ elapsed++; updateHUD(); }, 1000);
}

function endGame() {
  gameOver=true;
  clearInterval(timerHandle); clearInterval(spawnHandle);
  const timeBonus=Math.max(0,(60-elapsed)*5);
  score+=timeBonus;
  playSfx('ganar');
  document.getElementById('final-score').textContent='¡Puntaje: '+score+'!';
  document.getElementById('win-screen').classList.add('show');
}

function restartGame() {
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('char-lane').innerHTML='';
  document.querySelectorAll('.character').forEach(el=>el.remove());
  score=0; elapsed=0; seated=0; gameOver=false;
  seatFilled=Array(TOTAL_SEATS).fill(false);
  dragged=null; sectorCursor=0;
  stopPhysics(); clearInterval(timerHandle); clearInterval(spawnHandle);
  buildSeats(); updateHUD(); initGame();
}

function initGame() {
  pickCharacters(); startTimer(); spawnNext();
  spawnHandle=setInterval(()=>{ if(spawnIndex<spawnQueue.length) spawnNext(); else clearInterval(spawnHandle); }, SPAWN_INTERVAL);
}

buildSeats(); updateHUD(); initGame();
</script>
</body>
</html>
